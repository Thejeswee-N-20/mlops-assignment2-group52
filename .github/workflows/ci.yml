name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Build Docker image
        run: docker build -t cats-dogs-api .
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker tag cats-dogs-api ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest
          
  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Pull Docker Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest

      - name: Stop Existing Container
        run: |
          docker stop cats-dogs-api || true
          docker rm cats-dogs-api || true

      - name: Run New Container
        run: |
          docker run -d -p 8000:8000 --name cats-dogs-api ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest

      - name: Wait for Service to Start
        run: sleep 15

      - name: Smoke Test - Health Check
        run: curl http://localhost:8000/health 